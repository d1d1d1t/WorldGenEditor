<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>WorldGenEditor</title>

<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/windows.css">

<style>

/* =========================================================
   GLOBAL
   ========================================================= */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

    font-family:monospace;

}

/* =========================================================
   LAYOUT
   ========================================================= */

#workspace{

    position:absolute;

    inset:0;

    display:grid;

    grid-template-columns:2fr 2fr 1fr 1fr;

    grid-template-rows:1fr 1fr;

    background:#000;

}

/* =========================================================
   CELLS
   ========================================================= */

.zone{

    position:relative;

    overflow:hidden;

    border:1px solid #222;

    background:#111;

}

/* terrain */

#terrainZone{

    grid-column:1 / span 2;

    grid-row:1 / span 2;

}

/* road */

#roadZone{

    grid-column:3;

    grid-row:1 / span 2;

}

/* feature */

#featureZone{

    grid-column:4;

    grid-row:1;

    aspect-ratio:4 / 3;

}

/* toolbox */

#toolboxZone{

    grid-column:4;

    grid-row:2;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:8px;

}

button{

    padding:8px 12px;

    cursor:pointer;

}

iframe{

    width:100%;

    height:100%;

    border:none;

    display:block;

}

</style>

</head>

<body>

<div id="workspace">

<div id="terrainZone" class="zone"></div>

<div id="roadZone" class="zone"></div>

<div id="featureZone" class="zone"></div>

<div id="toolboxZone" class="zone">

<button id="terrainBtn">Terrain</button>

<button id="roadBtn">Road</button>

<button id="featureBtn">Feature</button>

</div>

</div>

<script type="module">

import { PROJECT } from "./shared/project.js";

import { MSG } from "./shared/widget-api.js";

/* ==========================================================
    ZONES
========================================================== */

const terrainZone =
document.getElementById("terrainZone");

const roadZone =
document.getElementById("roadZone");

const featureZone =
document.getElementById("featureZone");

/* ==========================================================
    WIDGET REFERENCES
========================================================== */

const widgets={

    terrain:null,

    road:null,

    feature:null

};

/* ==========================================================
    CREATE
========================================================== */

function launchWidget(name,url,zone){

    if(widgets[name]){

        return;

    }

    const frame=
    document.createElement("iframe");

    frame.src=url;

    frame.onload=()=>{

        frame.contentWindow.postMessage({

            type:MSG.INIT,

            payload:{

                name,

                project:PROJECT

            }

        },"*");

    };

    zone.innerHTML="";

    zone.appendChild(frame);

    widgets[name]=frame;

}

/* ==========================================================
    BUTTONS
========================================================== */

terrainBtn.onclick=()=>{

    launchWidget(

        "terrain",

        "widgets/terrain.html",

        terrainZone

    );

};

roadBtn.onclick=()=>{

    launchWidget(

        "road",

        "widgets/road.html",

        roadZone

    );

};

featureBtn.onclick=()=>{

    launchWidget(

        "feature",

        "widgets/feature.html",

        featureZone

    );

};

/* ==========================================================
    HUB ROUTER
========================================================== */

window.addEventListener(

"message",

event=>{

const msg=event.data;

if(!msg)return;

/* --------------------------------------------
   TERRAIN -> ROAD
--------------------------------------------- */

if(

msg.type==="TERRAIN_EDGE_PROFILE"

){

if(widgets.road){

widgets.road.contentWindow.postMessage({

type:"ROAD_EDGE_PROFILE",

payload:msg.payload

},"*");

}

}

/* --------------------------------------------
   ROAD -> OVERPASS
--------------------------------------------- */

if(

msg.type==="ROAD_PROFILE"

){

// future

}

/* --------------------------------------------
   FEATURE -> HUB
--------------------------------------------- */

if(

msg.type==="FEATURE_PROFILE"

){

// future

}

}

);

console.log(

"WorldGenEditor Ready",

PROJECT

);

</script>

</body>
</html>
