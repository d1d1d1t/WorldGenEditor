<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorldGenEditor</title>

<style>

/* =========================================================
   GLOBAL
========================================================= */

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:monospace;
}

/* =========================================================
   VIEWPORT ROOT
========================================================= */

#viewport{

    width:100%;
    height:100%;

    display:flex;

    justify-content:center;
    align-items:center;

}

/* =========================================================
   FITTING CONTAINER (IMPORTANT)
========================================================= */

#frame{

    width:95vw;
    height:95vh;

    display:grid;

    grid-template-columns: 2fr 2fr 1fr 1fr;
    grid-template-rows: 2fr 1fr;

    gap:6px;

    transform-origin:center;

}

/* =========================================================
   ZONES (DISPLAY PANES ONLY)
========================================================= */

.zone{

    position:relative;

    overflow:hidden;

    border:1px solid #222;

    background:#111;

    display:flex;

}

/* terrain (visual pane only) */

#terrainZone{
    grid-column:1 / span 2;
    grid-row:1 / span 2;
}

/* road */

#roadZone{
    grid-column:3;
    grid-row:1 / span 2;
}

/* feature */

#featureZone{
    grid-column:4;
    grid-row:1;
}

/* toolbox */

#toolboxZone{
    grid-column:4;
    grid-row:2;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;

    background:#0b0b0b;
}

/* =========================================================
   IFRAME BEHAVIOR (CRITICAL FIX)
========================================================= */

iframe{

    width:100%;
    height:100%;

    border:none;

}

/* =========================================================
   BUTTONS
========================================================= */

button{

    padding:6px 10px;

    background:#222;

    border:1px solid #333;

    color:#fff;

    cursor:pointer;

}

button:hover{
    background:#333;
}

</style>
</head>

<body>

<div id="viewport">

<div id="frame">

    <div id="terrainZone" class="zone"></div>

    <div id="roadZone" class="zone"></div>

    <div id="featureZone" class="zone"></div>

    <div id="toolboxZone" class="zone">

        <button id="btnTerrain">Terrain</button>
        <button id="btnRoad">Road</button>
        <button id="btnFeature">Feature</button>

    </div>

</div>

</div>

<script type="module">

import { PROJECT } from "./shared/project.js";
import { MSG } from "./shared/widget-api.js";

/* =========================================================
   ZONES
========================================================= */

const terrainZone =
document.getElementById("terrainZone");

const roadZone =
document.getElementById("roadZone");

const featureZone =
document.getElementById("featureZone");

/* =========================================================
   STATE
========================================================= */

const widgets = {
    terrain:null,
    road:null,
    feature:null
};

/* =========================================================
   LAUNCH SYSTEM
========================================================= */

function launch(name,url,zone){

    if(widgets[name]) return;

    const frame =
    document.createElement("iframe");

    frame.src = url;

    frame.onload = () => {

        frame.contentWindow.postMessage({

            type:MSG.INIT,

            payload:{
                name,
                project:PROJECT
            }

        },"*");

    };

    zone.innerHTML = "";
    zone.appendChild(frame);

    widgets[name] = frame;

}

/* =========================================================
   BUTTONS
========================================================= */

btnTerrain.onclick = () =>
launch("terrain","widgets/terrain.html",terrainZone);

btnRoad.onclick = () =>
launch("road","widgets/road.html",roadZone);

btnFeature.onclick = () =>
launch("feature","widgets/feature.html",featureZone);

/* =========================================================
   AUTO FIT SYSTEM (KEY ADDITION)
========================================================= */

function fitViewport(){

    const frame =
    document.getElementById("frame");

    const scaleX =
        window.innerWidth / frame.scrollWidth;

    const scaleY =
        window.innerHeight / frame.scrollHeight;

    const scale =
        Math.min(scaleX, scaleY) * 0.95;

    frame.style.transform =
        `scale(${scale})`;

}

window.addEventListener("resize",fitViewport);

fitViewport();

/* =========================================================
   INIT
========================================================= */

console.log("WorldGenEditor viewport mode active", PROJECT);

</script>

</body>
</html>
