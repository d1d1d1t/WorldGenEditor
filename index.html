<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorldGenEditor</title>

<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/windows.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: monospace;
}

/* =========================================================
   TOOLBAR (GLOBAL CONTROL)
   ========================================================= */

#menu {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;

  background: #111;
  border-bottom: 1px solid #222;

  display: flex;
  align-items: center;
  padding: 0 10px;

  z-index: 100;
}

/* =========================================================
   WORKSPACE GRID (FIXED CONSTRAINT SYSTEM)
   ========================================================= */

#workspace {
  position: absolute;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;

  display: grid;

  grid-template-columns: 2fr 2fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;

  gap: 0;

  background: #000;
}

/* =========================================================
   ZONES (CORE CELLS)
   ========================================================= */

.zone {
  position: relative;
  overflow: hidden;
  border: 1px solid #222;
  background: #111;
}

/* =========================================================
   TERRAIN (2x2 BLOCK)
   ========================================================= */

#terrainZone {
  grid-column: 1 / span 2;
  grid-row: 1 / span 2;
}

/* =========================================================
   ROAD (FULL HEIGHT STRIP)
   ========================================================= */

#roadZone {
  grid-column: 3;
  grid-row: 1 / span 2;
}

/* =========================================================
   FEATURE (4:3 CONSTRAINED TOP RIGHT)
   ========================================================= */

#featureZone {
  grid-column: 4;
  grid-row: 1;

  aspect-ratio: 4 / 3;
}

/* =========================================================
   TOOLBOX (6:7 BOTTOM RIGHT CELL)
   ========================================================= */

#menu {
  grid-column: 4;
  grid-row: 2;

  background: #111;
  border-top: 1px solid #222;
  border-left: 1px solid #222;

  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<!-- TOOLBAR -->
<div id="menu"></div>

<!-- WORKSPACE -->
<div id="workspace"></div>

<script type="module">

import { PROJECT } from "./shared/project.js";
import { sendToWidget, MSG } from "./shared/widget-api.js";

const workspace = document.getElementById("workspace");
const menuZone = document.getElementById("menu");

/* =========================================================
   WIDGET CREATION SYSTEM
   ========================================================= */

function createWidget(name, url, zone) {

  // container frame wrapper
  const wrapper = document.createElement("div");
  wrapper.style.width = "100%";
  wrapper.style.height = "100%";
  wrapper.style.display = "flex";
  wrapper.style.flexDirection = "column";

  // iframe
  const frame = document.createElement("iframe");
  frame.src = url;
  frame.style.flex = "1";
  frame.style.border = "none";

  frame.onload = () => {
    sendToWidget(frame, {
      type: MSG.INIT,
      payload: {
        name,
        project: PROJECT
      }
    });
  };

  wrapper.appendChild(frame);
  zone.appendChild(wrapper);

  return wrapper;
}

/* =========================================================
   ZONES (SINGLE SOURCE OF TRUTH)
   ========================================================= */

const terrainZone = document.createElement("div");
terrainZone.id = "terrainZone";
terrainZone.className = "zone";

const featureZone = document.createElement("div");
featureZone.id = "featureZone";
featureZone.className = "zone";

const roadZone = document.createElement("div");
roadZone.id = "roadZone";
roadZone.className = "zone";

/* append zones */
workspace.appendChild(terrainZone);
workspace.appendChild(featureZone);
workspace.appendChild(roadZone);

/* =========================================================
   TOOLBAR UI
   ========================================================= */

menuZone.innerHTML = `
  <button id="btnTerrain">Terrain</button>
  <button id="btnFeature">Feature</button>
  <button id="btnRoad">Road</button>
`;

/* =========================================================
   LAUNCH SYSTEM (ON DEMAND ONLY)
   ========================================================= */

document.getElementById("btnTerrain").onclick = () =>
  createWidget("terrain", "widgets/terrain.html", terrainZone);

document.getElementById("btnFeature").onclick = () =>
  createWidget("feature", "widgets/feature.html", featureZone);

document.getElementById("btnRoad").onclick = () =>
  createWidget("road", "widgets/road.html", roadZone);

/* =========================================================
   DEBUG
   ========================================================= */

console.log("WorldGenEditor initialized:", PROJECT);

</script>

</body>
</html>
