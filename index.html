<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorldGenEditor</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: monospace;
}

/* =========================
   GRID
========================= */

#workspace {
  display: grid;

  grid-template-columns: 20% 20% 20% 20% 20%;
  grid-template-rows: 50% 50%;

  width: 100vw;
  height: 100vh;
}

/* =========================
   ZONES
========================= */

.zone {
  position: relative;
  overflow: hidden;
  background: #111;
  border: 1px solid #222;
}

#terrainZone { grid-column: 1 / span 3; grid-row: 1 / span 2; }
#roadZone    { grid-column: 4; grid-row: 1 / span 2; }
#featureZone { grid-column: 5; grid-row: 1; }
#toolboxZone { grid-column: 5; grid-row: 2; background:#0f0f0f; }

/* =========================
   CONTAINMENT
========================= */

.widgetFrame {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

</style>
</head>

<body>

<div id="workspace">

  <div id="terrainZone" class="zone"></div>
  <div id="roadZone" class="zone"></div>
  <div id="featureZone" class="zone"></div>
  <div id="toolboxZone" class="zone"></div>

</div>

<script type="module">

import { PROJECT } from "./shared/project.js";

/* =========================
   STATE
========================= */

let widgets = {};
let terrainGrid = null;

/* =========================
   MOUNT SYSTEM
========================= */

function mount(zone, url){

  const frame = document.createElement("iframe");

  const wrapper = document.createElement("div");
  wrapper.className = "widgetFrame";

  frame.src = url;

  wrapper.appendChild(frame);
  zone.appendChild(wrapper);

  return frame;
}

/* =========================
   LAZY LOAD
========================= */

function load(name, url, zone){
  if(!widgets[name]){
    widgets[name] = mount(zone, url);
  }
}

/* =========================
   SAFE SEND
========================= */

function send(name, msg){
  if(!widgets[name]) return;
  widgets[name].contentWindow.postMessage(msg, "*");
}

/* =========================
   TERRAIN → ROAD COUPLING
========================= */

function syncTerrainToRoad(){

  if(!widgets.road || !terrainGrid) return;

  send("road", {
    type: "SET_TERRAIN",
    payload: { grid: terrainGrid }
  });

}

/* =========================
   TOOLBOX UI
========================= */

const toolboxZone = document.getElementById("toolboxZone");

toolboxZone.innerHTML = `
<div style="color:#aaa;padding:10px;">
  <button id="genAll">Generate</button>
  <button id="expAll">Export</button>
</div>
`;

/* =========================
   RECEIVE MESSAGES
========================= */

window.addEventListener("message", (e) => {

  const msg = e.data;
  if(!msg) return;

  switch(msg.type){

    /* TERRAIN PUSHES ITS GRID HERE */
    case "TERRAIN_DATA":
      terrainGrid = msg.payload.grid;

      // immediately sync road when terrain updates
      syncTerrainToRoad();
      break;
  }

});

/* =========================
   BUTTONS
========================= */

document.getElementById("genAll").onclick = () => {

  load("terrain","widgets/terrain.html",document.getElementById("terrainZone"));
  load("road","widgets/road.html",document.getElementById("roadZone"));
  load("feature","widgets/feature.html",document.getElementById("featureZone"));

  // 1. refresh terrain first
  send("terrain", { type: "GENERATE" });

  // 2. short delay ensures terrain finishes rendering + state update
  setTimeout(() => {

    if (terrainGrid) {
      send("road", {
        type: "SET_TERRAIN",
        payload: { grid: terrainGrid }
      });
    }

  }, 50);

  // feature independent refresh
  send("feature", { type: "GENERATE" });

};

document.getElementById("expAll").onclick = () => {

  send("terrain",{type:"EXPORT"});
  send("road",{type:"EXPORT"});
  send("feature",{type:"EXPORT"});

};

</script>

</body>
</html>
