<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WorldGenEditor</title>

  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/windows.css">

  <style>
/* =========================================================
   GLOBAL RESET
   ========================================================= */

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: monospace;
}

/* =========================================================
   TOOLBAR (SAFE ZONE)
   ========================================================= */

#menu {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;

  background: #111;
  border-bottom: 1px solid #222;

  display: flex;
  align-items: center;
  padding: 0 10px;

  z-index: 100;
}

/* =========================================================
   MAIN LAYOUT CONTAINER RULE
   ========================================================= */

#workspace {
  position: absolute;
  top: 60px; /* below toolbar */
  left: 0;
  right: 0;
  bottom: 0;

  display: flex;

  background: #000;
  overflow: hidden;
}

/* =========================================================
   ZONES (CORE LAYOUT BLOCKS)
   ========================================================= */

.zone {
  position: relative;
  height: 100%;
  overflow: hidden;
  border: 1px solid #222;
  background: #111;
}

/* =========================================================
   4 : 2 : 1 RATIO SYSTEM
   ========================================================= */

#terrainZone {
  flex: 4;
  min-width: 0;
}

#featureZone {
  flex: 2;
  min-width: 0;
}

#roadZone {
  flex: 1;
  min-width: 0;
}

/* =========================================================
   VISUAL SAFETY (prevents iframe overflow bugs)
   ========================================================= */

.window-title {
  user-select: none;
  background: #222;
  color: white;
  padding: 6px 10px;
  font-size: 13px;
  height: 28px;
  box-sizing: border-box;
}

.window-body {
  width: 100%;
  height: calc(100% - 28px);
}

.window-body iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* =========================================================
   GUARANTEED NEGATIVE SPACE BEHAVIOR
   ========================================================= */

.zone:not(:last-child) {
  border-right: 1px solid #111;
}
</style>
</head>

<body>

<div id="workspace"></div>

<script type="module">
import { PROJECT } from "./shared/project.js";
import { sendToWidget, MSG } from "./shared/widget-api.js";

const workspace = document.getElementById("workspace");

/* zones */
const menuZone    = document.createElement("div");
menuZone.id = "menu";
menuZone.className = "zone";

const terrainZone = document.createElement("div");
terrainZone.id = "terrainZone";
terrainZone.className = "zone";

const featureZone = document.createElement("div");
featureZone.id = "featureZone";
featureZone.className = "zone";

const roadZone = document.createElement("div");
roadZone.id = "roadZone";
roadZone.className = "zone";

const padL = document.createElement("div");
padL.className = "zone padL";

const padR = document.createElement("div");
padR.className = "zone padR";

workspace.appendChild(menuZone);
workspace.appendChild(padL);
workspace.appendChild(terrainZone);
workspace.appendChild(featureZone);
workspace.appendChild(roadZone);
workspace.appendChild(padR);

  return zone;
}

/* =========================================================
   GRID LAYOUT MAP
   ========================================================= */

const menuZone    = createZone(1, 1, 3, 1); // top full width
const terrainZone = createZone(2, 2, 1, 2); // center column spanning rows
const featureZone = createZone(3, 2, 1, 1); // upper right
const roadZone    = createZone(3, 3, 1, 1); // lower right

workspace.appendChild(menuZone);
workspace.appendChild(terrainZone);
workspace.appendChild(featureZone);
workspace.appendChild(roadZone);

/* =========================================================
   MENU (STATIC TOOLBAR)
   ========================================================= */

menuZone.innerHTML = `
  <div style="color:#fff; font-family:monospace; padding:10px;">
    <button id="btnTerrain">Terrain</button>
    <button id="btnFeature">Feature</button>
    <button id="btnRoad">Road</button>
  </div>
`;

/* =========================================================
   LAUNCH SYSTEM (NO AUTO WINDOWS)
   ========================================================= */

document.getElementById("btnTerrain").onclick = () =>
  createWidget("terrain", "widgets/terrain.html", terrainZone);

document.getElementById("btnFeature").onclick = () =>
  createWidget("feature", "widgets/feature.html", featureZone);

document.getElementById("btnRoad").onclick = () =>
  createWidget("road", "widgets/road.html", roadZone);

/* =========================================================
   INIT
   ========================================================= */

console.log("WorldGenEditor initialized:", PROJECT);

</script>

</body>
</html>
