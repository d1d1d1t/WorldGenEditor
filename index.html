<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WorldGenEditor</title>

<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/theme.css">

<style>

/* ================================
   ABSOLUTE CUBE LAYOUT
================================ */

html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family: monospace;
}

/* GRID IS NOW STATIC */
#workspace {
  position:absolute;
  top:60px;
  left:0;
  right:0;
  bottom:0;

  display:grid;

  grid-template-columns: 2fr 2fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
}

/* PANES */
.zone {
  position:relative;
  overflow:hidden;
  border:1px solid #222;
  background:#111;
}

/* TERRAIN 2x2 */
#terrain {
  grid-column:1 / span 2;
  grid-row:1 / span 2;
}

/* ROAD STRIP */
#road {
  grid-column:3;
  grid-row:1 / span 2;
}

/* FEATURE TOP RIGHT */
#feature {
  grid-column:4;
  grid-row:1;
}

/* TOOLBOX BOTTOM RIGHT */
#toolbox {
  grid-column:4;
  grid-row:2;
  background:#0f0f0f;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<div id="toolbox"></div>
<div id="workspace"></div>

<script type="module">

import { PROJECT } from "./shared/project.js";

/* ================================
   WIDGET CREATION
================================ */

function mountWidget(id, url, container) {

  const frame = document.createElement("iframe");

  frame.src = url;
  frame.style.width = "100%";
  frame.style.height = "100%";
  frame.style.border = "none";

  container.appendChild(frame);

  return frame;
}

/* ================================
   ZONES
================================ */

const terrainZone = document.createElement("div");
terrainZone.id = "terrain";
terrainZone.className = "zone";

const roadZone = document.createElement("div");
roadZone.id = "road";
roadZone.className = "zone";

const featureZone = document.createElement("div");
featureZone.id = "feature";
featureZone.className = "zone";

const toolbox = document.getElementById("toolbox");
const workspace = document.getElementById("workspace");

workspace.appendChild(terrainZone);
workspace.appendChild(roadZone);
workspace.appendChild(featureZone);

/* ================================
   MOUNT WIDGETS (LAZY)
================================ */

let widgets = {};

function loadTerrain(){
  if(!widgets.terrain)
    widgets.terrain = mountWidget("terrain","widgets/terrain.html",terrainZone);
}

function loadRoad(){
  if(!widgets.road)
    widgets.road = mountWidget("road","widgets/road.html",roadZone);
}

function loadFeature(){
  if(!widgets.feature)
    widgets.feature = mountWidget("feature","widgets/feature.html",featureZone);
}

/* ================================
   TOOLBOX UI
================================ */

toolbox.innerHTML = `

<button id="genTerrain">Generate Terrain</button>
<button id="genRoad">Generate Road</button>
<button id="genFeature">Generate Feature</button>

<hr/>

<button id="exportTerrain">Export Terrain</button>
<button id="exportRoad">Export Road</button>
<button id="exportFeature">Export Feature</button>

<button id="exportAll">Export All</button>

`;

/* ================================
   GENERATE
================================ */

document.getElementById("genTerrain").onclick = () => {
  loadTerrain();
  widgets.terrain.contentWindow.postMessage({type:"GENERATE_TERRAIN"},"*");
};

document.getElementById("genRoad").onclick = () => {
  loadRoad();
  widgets.road.contentWindow.postMessage({type:"GENERATE_ROAD"},"*");
};

document.getElementById("genFeature").onclick = () => {
  loadFeature();
  widgets.feature.contentWindow.postMessage({type:"GENERATE_FEATURE"},"*");
};

/* ================================
   EXPORT
================================ */

document.getElementById("exportTerrain").onclick = () => {
  loadTerrain();
  widgets.terrain.contentWindow.postMessage({type:"EXPORT_TERRAIN"},"*");
};

document.getElementById("exportRoad").onclick = () => {
  loadRoad();
  widgets.road.contentWindow.postMessage({type:"EXPORT_ROAD"},"*");
};

document.getElementById("exportFeature").onclick = () => {
  loadFeature();
  widgets.feature.contentWindow.postMessage({type:"EXPORT_FEATURE"},"*");
};

document.getElementById("exportAll").onclick = () => {

  loadTerrain();
  loadRoad();
  loadFeature();

  widgets.terrain.contentWindow.postMessage({type:"EXPORT_TERRAIN"},"*");
  widgets.road.contentWindow.postMessage({type:"EXPORT_ROAD"},"*");
  widgets.feature.contentWindow.postMessage({type:"EXPORT_FEATURE"},"*");

};

</script>

</body>
</html>
