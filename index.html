<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WorldGenEditor</title>

  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/windows.css">

  <style>
    /* =========================================================
       GLOBAL GRID LAYOUT
       ========================================================= */

    #workspace {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 60px 1fr 1fr;

      width: 100vw;
      height: 100vh;

      background: #000;
      overflow: hidden;
    }

    .zone {
      border: 1px solid #222;
      overflow: hidden;
      position: relative;
      background: #111;
    }

    .window-title {
      user-select: none;
      background: var(--titlebar, #222);
      padding: 6px 10px;
      font-size: 13px;
      height: 28px;
      box-sizing: border-box;
      color: #fff;
    }

    .window-body {
      width: 100%;
      height: calc(100% - 28px);
    }

    .window-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

  </style>
</head>

<body>

<div id="workspace"></div>

<script type="module">
import { PROJECT } from "./shared/project.js";
import { sendToWidget, MSG } from "./shared/widget-api.js";

const workspace = document.getElementById("workspace");

/* =========================================================
   ZONE CREATION
   ========================================================= */

function createZone(col, row, colSpan = 1, rowSpan = 1) {

  const zone = document.createElement("div");
  zone.className = "zone";

  zone.style.gridColumn = `${col} / span ${colSpan}`;
  zone.style.gridRow = `${row} / span ${rowSpan}`;

  return zone;
}

/* =========================================================
   WIDGET CREATION
   ========================================================= */

function createWidget(name, url, zone) {

  const title = document.createElement("div");
  title.className = "window-title";
  title.textContent = name;

  const body = document.createElement("div");
  body.className = "window-body";

  const frame = document.createElement("iframe");
  frame.src = url;

  frame.onload = () => {
    sendToWidget(frame, {
      type: MSG.INIT,
      payload: {
        name,
        project: PROJECT
      }
    });
  };

  body.appendChild(frame);
  zone.appendChild(title);
  zone.appendChild(body);

  return zone;
}

/* =========================================================
   GRID LAYOUT MAP
   ========================================================= */

const menuZone    = createZone(1, 1, 3, 1); // top full width
const terrainZone = createZone(2, 2, 1, 2); // center column spanning rows
const featureZone = createZone(3, 2, 1, 1); // upper right
const roadZone    = createZone(3, 3, 1, 1); // lower right

workspace.appendChild(menuZone);
workspace.appendChild(terrainZone);
workspace.appendChild(featureZone);
workspace.appendChild(roadZone);

/* =========================================================
   MENU (STATIC TOOLBAR)
   ========================================================= */

menuZone.innerHTML = `
  <div style="color:#fff; font-family:monospace; padding:10px;">
    <button id="btnTerrain">Terrain</button>
    <button id="btnFeature">Feature</button>
    <button id="btnRoad">Road</button>
  </div>
`;

/* =========================================================
   LAUNCH SYSTEM (NO AUTO WINDOWS)
   ========================================================= */

document.getElementById("btnTerrain").onclick = () =>
  createWidget("terrain", "widgets/terrain.html", terrainZone);

document.getElementById("btnFeature").onclick = () =>
  createWidget("feature", "widgets/feature.html", featureZone);

document.getElementById("btnRoad").onclick = () =>
  createWidget("road", "widgets/road.html", roadZone);

/* =========================================================
   INIT
   ========================================================= */

console.log("WorldGenEditor initialized:", PROJECT);

</script>

</body>
</html>
