<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terrain (t) Generator</title>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

#wrap{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{

    width:100%;
    height:100%;

    aspect-ratio:1/1;

    display:block;

    image-rendering:pixelated;

}

</style>
</head>

<body>

<div id="wrap">
<canvas id="terrainCanvas"
        width="1920"
        height="1920"></canvas>
</div>

<script type="module">

/* ==========================================================
    TERRAIN CONSTANTS
========================================================== */

const GRID_SIZE = 10;

const TILE_SIZE = 192;

const EXPORT_SIZE = 1920;

const HEIGHT_VALUES = [

    255,
    191,
    128,
    64,
    26

];

/* ==========================================================
    CANVAS
========================================================== */

const canvas =
    document.getElementById("terrainCanvas");

const ctx =
    canvas.getContext("2d");

/* ==========================================================
    TERRAIN OBJECT
========================================================== */

const terrain = {

    grid:[],

    edgeProfiles:{

        top:[],

        bottom:[],

        left:[],

        right:[]

    }

};

/* ==========================================================
    RANDOM HEIGHT
========================================================== */

function randomHeight(){

    return HEIGHT_VALUES[
        Math.floor(
            Math.random()*HEIGHT_VALUES.length
        )
    ];

}

/* ==========================================================
    BUILD GRID
========================================================== */

function buildGrid(){

    terrain.grid =
        Array.from(

            {length:GRID_SIZE},

            ()=>Array(GRID_SIZE).fill(0)

        );

    let whiteCount=0;

    for(let y=0;y<GRID_SIZE;y++){

        for(let x=0;x<GRID_SIZE;x++){

            let v=randomHeight();

            if(v===255 && whiteCount>=4){

                v=128;

            }

            terrain.grid[y][x]=v;

            if(v===255){

                whiteCount++;

            }

        }

    }

    terrain.grid[5][5]=255;

}

/* ==========================================================
    BUILD EDGE PROFILES
========================================================== */

function buildEdgeProfiles(){

    terrain.edgeProfiles.top =
        [...terrain.grid[0]];

    terrain.edgeProfiles.bottom =
        [...terrain.grid[GRID_SIZE-1]];

    terrain.edgeProfiles.left =
        terrain.grid.map(r=>r[0]);

    terrain.edgeProfiles.right =
        terrain.grid.map(r=>r[GRID_SIZE-1]);

}

/* ==========================================================
    DRAW TERRAIN
========================================================== */

function drawTerrain(){

    ctx.clearRect(

        0,
        0,
        EXPORT_SIZE,
        EXPORT_SIZE

    );

    for(let y=0;y<GRID_SIZE;y++){

        for(let x=0;x<GRID_SIZE;x++){

            const v=
                terrain.grid[y][x];

            ctx.fillStyle=
                `rgb(${v},${v},${v})`;

            ctx.fillRect(

                x*TILE_SIZE,

                y*TILE_SIZE,

                TILE_SIZE,

                TILE_SIZE

            );

        }

    }

}

/* ==========================================================
    EXPORT
========================================================== */

function exportTerrain(){

    const link=
        document.createElement("a");

    link.download="terrain_1920.jpg";

    link.href=
        canvas.toDataURL(

            "image/jpeg",

            1.0

        );

    link.click();

}

/* ==========================================================
    SEND EDGE PROFILE
========================================================== */

function notifyHub(){

    window.parent.postMessage({

        type:"TERRAIN_EDGE_PROFILE",

        payload:{

            top:
                terrain.edgeProfiles.top,

            bottom:
                terrain.edgeProfiles.bottom,

            left:
                terrain.edgeProfiles.left,

            right:
                terrain.edgeProfiles.right

        }

    },"*");

}

/* ==========================================================
    GENERATE
========================================================== */

function generateTerrain(){

    buildGrid();

    buildEdgeProfiles();

    drawTerrain();

    notifyHub();

}

/* ==========================================================
    HUB MESSAGES
========================================================== */

window.addEventListener(

    "message",

    e=>{

        const msg=e.data;

        if(!msg)return;

        switch(msg.type){

            case "EXPORT_TERRAIN":

                exportTerrain();

                break;

            case "REGENERATE_TERRAIN":

                generateTerrain();

                break;

        }

    }

);

/* ==========================================================
    INITIALIZE
========================================================== */

generateTerrain();

console.log(
    "Terrain widget ready."
);

</script>

</body>
</html>
