<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terrain (t) Generator</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
}

/* =========================================================
   CANVAS MUST ALWAYS BE SQUARE VISUALLY
   ========================================================= */

#wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* THIS is the key fix */
canvas {
    width: 100%;
    height: 100%;
    aspect-ratio: 1 / 1;

    image-rendering: pixelated;
    display: block;
}
</style>
</head>

<body>

<div id="wrap">
<canvas id="c" width="1920" height="1920"></canvas>
</div>

<script type="module">

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const GRID_SIZE = 10;
const TILE_SIZE = 192;

const VALUES = [255, 191, 128, 64, 26];

/* =========================================================
   GENERATION
   ========================================================= */

function rand() {
    return VALUES[Math.floor(Math.random() * VALUES.length)];
}

function buildGrid() {
    const grid = Array.from({ length: GRID_SIZE }, () =>
        Array(GRID_SIZE).fill(0)
    );

    let white = 0;

    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {

            let v = rand();

            if (v === 255 && white >= 4) {
                v = 128;
            }

            grid[y][x] = v;

            if (v === 255) white++;
        }
    }

    // enforce center anchor
    grid[5][5] = 255;

    return grid;
}

/* =========================================================
   RENDER (ALWAYS 1920x1920 INTERNAL)
   ========================================================= */

function draw(grid) {

    ctx.clearRect(0, 0, 1920, 1920);

    for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {

            const v = grid[y][x];

            ctx.fillStyle = `rgb(${v},${v},${v})`;

            ctx.fillRect(
                x * TILE_SIZE,
                y * TILE_SIZE,
                TILE_SIZE,
                TILE_SIZE
            );
        }
    }
}

/* =========================================================
   EXPORT (ALWAYS TRUE 1920x1920)
   ========================================================= */

function exportCanvas() {
    const link = document.createElement("a");
    link.download = "terrain_1920.jpg";
    link.href = canvas.toDataURL("image/jpeg", 1.0);
    link.click();
}

/* =========================================================
   INIT
   ========================================================= */

const grid = buildGrid();
draw(grid);

/* optional hook for hub button */
window.addEventListener("message", (e) => {
    if (e.data?.type === "EXPORT_TERRAIN") {
        exportCanvas();
    }
});

</script>

</body>
</html>
