<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terrain Widget</title>

<style>

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: monospace;
}

/* =========================
   ROOT LAYOUT
========================= */

#widget {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* =========================
   LOCAL TOOLBAR
========================= */

#toolbar {
  height: 42px;
  background: #1a1a1a;
  border-bottom: 1px solid #222;

  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px;
}

button {
  background: #222;
  color: #ccc;
  border: 1px solid #333;
  cursor: pointer;
  padding: 4px 8px;
  font-size: 12px;
}

/* =========================
   CANVAS CONTAINER (NO CROPPING)
========================= */

#canvasWrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* IMPORTANT: visual scaling only */
canvas {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  display: block;
  image-rendering: pixelated;
}

</style>
</head>

<body>

<div id="widget">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button id="genT">Generate (t)</button>
    <button id="genM">Generate (mTile)</button>
    <button id="exportBtn">Export</button>
  </div>

  <!-- CANVAS -->
  <div id="canvasWrap">
    <canvas id="c" width="1920" height="1920"></canvas>
  </div>

</div>

<script type="module">

/* =========================
   CANVAS SETUP
========================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const SIZE = 1920;

/* =========================
   SYSTEM CONSTANTS
========================= */

// (t) tiles
const T_SIZE = 192;
const T_GRID = 10;

// mTiles
const MTILE_SIZE = 64;
const M_GRID = 30;

/* =========================
   VALUE SET
========================= */

const VALUES = [255, 191, 128, 64, 26];

/* =========================
   DATA GRIDS
========================= */

let tGrid = Array.from({ length: T_GRID }, () =>
  Array(T_GRID).fill(128)
);

let mGrid = Array.from({ length: M_GRID }, () =>
  Array(M_GRID).fill(128)
);

/* =========================
   GENERATE PER (t)
========================= */

function generateT(){

  for (let y = 0; y < T_GRID; y++) {
    for (let x = 0; x < T_GRID; x++) {

      tGrid[y][x] =
        VALUES[Math.floor(Math.random() * VALUES.length)];

    }
  }

  renderT();

}

/* =========================
   RENDER (t)
========================= */

function renderT(){

  ctx.clearRect(0,0,SIZE,SIZE);

  for (let y = 0; y < T_GRID; y++) {
    for (let x = 0; x < T_GRID; x++) {

      const v = tGrid[y][x];

      ctx.fillStyle = `rgb(${v},${v},${v})`;

      ctx.fillRect(
        x * T_SIZE,
        y * T_SIZE,
        T_SIZE,
        T_SIZE
      );

    }
  }

}

/* =========================
   GENERATE PER mTile
========================= */

function generateM(){

  for (let y = 0; y < M_GRID; y++) {
    for (let x = 0; x < M_GRID; x++) {

      mGrid[y][x] =
        VALUES[Math.floor(Math.random() * VALUES.length)];

    }
  }

  renderM();

}

/* =========================
   RENDER mTile
========================= */

function renderM(){

  ctx.clearRect(0,0,SIZE,SIZE);

  for (let y = 0; y < M_GRID; y++) {
    for (let x = 0; x < M_GRID; x++) {

      const v = mGrid[y][x];

      ctx.fillStyle = `rgb(${v},${v},${v})`;

      ctx.fillRect(
        x * MTILE_SIZE,
        y * MTILE_SIZE,
        MTILE_SIZE,
        MTILE_SIZE
      );

    }
  }

}

/* =========================
   EXPORT (ALWAYS 1920×1920)
========================= */

function exportTerrain(){

  const link = document.createElement("a");

  link.download = "terrain_1920.jpg";
  link.href = canvas.toDataURL("image/jpeg", 1.0);

  link.click();

}

/* =========================
   UI HOOKS
========================= */

document.getElementById("genT").onclick = () => {
  generateT();
  publishTerrain();
};

document.getElementById("genM").onclick = () => {
  generateM();
  publishTerrain();
};

document.getElementById("exportBtn").onclick = exportTerrain;

/* =========================
   HUB MESSAGING
========================= */

let terrainGrid = null;

window.addEventListener("message", (e) => {

  const msg = e.data;
  if(!msg) return;

  if(msg.type === "TERRAIN_DATA"){
    terrainGrid = msg.payload.grid;
  }

});

/* =========================
   INIT
========================= */

generateT();
generateM();

function publishTerrain(){
  window.parent.postMessage({
    type: "TERRAIN_DATA",
    payload: { grid: mGrid }
  }, "*");
}
</script>

</body>
</html>
