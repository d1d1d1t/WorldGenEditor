<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Road Generator</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

#wrap{
    width:100%;
    height:100%;
    display:flex;
}

canvas{
    width:100%;
    height:100%;
    image-rendering:pixelated;
}

</style>
</head>

<body>

<div id="wrap">
<canvas id="c" width="192" height="1920"></canvas>
</div>

<script type="module">

/* =========================================================
   CANVAS
========================================================= */

const canvas =
document.getElementById("c");

const ctx =
canvas.getContext("2d");

/* =========================================================
   CONFIG
========================================================= */

const config = {

    cord:0.75,     // road tightness to terrain

    invert:false,  // flip influence

    tileW:48,

    tileH:32

};

/* =========================================================
   STATE
========================================================= */

let edgeProfile = null;

let spine = [];

/* =========================================================
   MESSAGE IN
========================================================= */

window.addEventListener("message", (e)=>{

    const msg = e.data;

    if(!msg) return;

    if(msg.type === "ROAD_EDGE_PROFILE"){

        edgeProfile = msg.payload;

        generateRoad();

    }

});

/* =========================================================
   CORE ROAD GENERATION
========================================================= */

function generateRoad(){

    if(!edgeProfile) return;

    const right = edgeProfile.right;

    const rows = Math.floor(canvas.height / config.tileH);

    const cols = Math.floor(canvas.width / config.tileW);

    spine = [];

    const centerBase = Math.floor(cols / 2);

    for(let y=0;y<rows;y++){

        /* -----------------------------------------
           SAMPLE TERRAIN INFLUENCE
        ------------------------------------------ */

        const raw =
            right[y % right.length];

        let influence =
            raw / 255;

        if(config.invert){

            influence =
                1 - influence;

        }

        /* -----------------------------------------
           CORD SYSTEM (attraction strength)
        ------------------------------------------ */

        const offset =
            (influence - 0.5)
            * config.cord
            * cols;

        let x =
            Math.round(centerBase + offset);

        x = Math.max(0, Math.min(cols-1, x));

        spine.push(x);

    }

    render();

}

/* =========================================================
   RENDER ROAD
========================================================= */

function render(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const rows =
        spine.length;

    const cols =
        Math.floor(canvas.width / config.tileW);

    for(let y=0;y<rows;y++){

        const center =
            spine[y];

        for(let x=0;x<cols;x++){

            const dist =
                Math.abs(x-center);

            let v;

            /* -------------------------------------
               ROAD FALLOFF MODEL
            -------------------------------------- */

            if(dist===0) v=0.95;
            else if(dist===1) v=0.70;
            else if(dist===2) v=0.45;
            else v=0.20;

            const c =
                Math.floor(v*255);

            ctx.fillStyle =
                `rgb(${c},${c},${c})`;

            ctx.fillRect(

                x*config.tileW,
                y*config.tileH,
                config.tileW,
                config.tileH

            );

        }

    }

}

/* =========================================================
   OPTIONAL CONTROLS (DEBUG)
========================================================= */

window.setRoadCord = (v)=>{

    config.cord = v;

    generateRoad();

};

window.setRoadInvert = (v)=>{

    config.invert = v;

    generateRoad();

};

/* =========================================================
   INIT (EMPTY UNTIL TERRAIN ARRIVES)
========================================================= */

console.log("Road widget ready");

</script>

</body>
</html>
