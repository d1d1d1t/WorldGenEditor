<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Road (Coupled)</title>

<style>

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: monospace;
}

#widget {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* =========================
   TOOLBAR
========================= */

#toolbar {
  height: 42px;
  background: #1a1a1a;
  border-bottom: 1px solid #222;

  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px;
}

button {
  background: #222;
  color: #ccc;
  border: 1px solid #333;
  cursor: pointer;
  padding: 4px 8px;
}

/* =========================
   CANVAS
========================= */

#wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

canvas {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  image-rendering: pixelated;
  display: block;
}

</style>
</head>

<body>

<div id="widget">

  <div id="toolbar">
    <button id="regen">Generate Road</button>
    <button id="invert">Invert: OFF</button>
  </div>

  <div id="wrap">
    <canvas id="c" width="1920" height="1920"></canvas>
  </div>

</div>

<script type="module">

/* =========================
   CANVAS
========================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const SIZE = 1920;

/* =========================
   GRID (MATCH TERRAIN)
========================= */

const MTILE = 64;
const GRID = 30;

/* =========================
   STATE
========================= */

let inverted = false;

/* terrain input grid */
let terrain = Array.from({length:GRID}, () =>
  Array(GRID).fill(128)
);

/* =========================
   TERRAIN SAMPLING
========================= */

function t(x,y){
  return (terrain[y]?.[x] ?? 128) / 255;
}

/* =========================
   ROAD FIELD MODEL
========================= */

function generateRoad(){

  if(!terrain.length) return; // IMPORTANT FIX

  ctx.clearRect(0,0,SIZE,SIZE);

  let cx = Math.floor(GRID / 2);

  for(let y = 0; y < GRID; y++){

    /* =========================
       TERRAIN-AWARE STEERING
    ========================= */

    const left  = t(cx-1,y);
    const mid   = t(cx,y);
    const right = t(cx+1,y);

    // prefer LOW terrain density
    if(left < mid && left < right) cx--;
    else if(right < mid && right < left) cx++;

    cx = Math.max(0, Math.min(GRID-1, cx));

    /* =========================
       RENDER ROW
    ========================= */

    for(let x = 0; x < GRID; x++){

      const dist = Math.abs(x - cx);

      /* cord falloff */
      let intensity = Math.exp(-(dist*dist)/2);

      /* invert toggle */
      if(inverted) intensity = 1 - intensity;

      /* terrain coupling influence */
      const terrainFactor = 1 - t(x,y) * 0.35;

      intensity *= terrainFactor;

      const v = Math.floor(intensity * 255);

      ctx.fillStyle = `rgb(${v},${v},${v})`;

      ctx.fillRect(
        x * MTILE,
        y * MTILE,
        MTILE,
        MTILE
      );

    }

  }

}

/* =========================
   TOGGLE
========================= */

document.getElementById("invert").onclick = () => {

  inverted = !inverted;

  document.getElementById("invert").textContent =
    inverted ? "Invert: ON" : "Invert: OFF";

  generateRoad();

};

/* =========================
   HUB INPUT
========================= */

window.addEventListener("message", (e) => {

  const msg = e.data;
  if (!msg) return;

  switch (msg.type) {

    case "SET_TERRAIN":

      if (msg.payload?.grid) {
        terrain = msg.payload.grid;
        generateRoad(); // regenerate ONLY on valid data
      }

      break;

    case "GENERATE":
      // regenerate using last known terrain snapshot
      generateRoad();
      break;

    case "EXPORT":
      const link = document.createElement("a");
      link.download = "road_1920.jpg";
      link.href = canvas.toDataURL("image/jpeg", 1.0);
      link.click();
      break;
  }

});

/* =========================
   INIT
========================= */

generateRoad();

</script>

</body>
</html>
