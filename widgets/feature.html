<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feature Generator</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

#wrap{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    width:100%;
    height:100%;
    image-rendering:pixelated;
    transform-origin:center;
}

</style>
</head>

<body>

<div id="wrap">
<canvas id="c" width="384" height="288"></canvas>
</div>

<script type="module">

/* =========================================================
   CANVAS (single F block resolution baseline)
========================================================= */

const canvas =
document.getElementById("c");

const ctx =
canvas.getContext("2d");

/* =========================================================
   CONSTANTS
========================================================= */

const F_WIDTH = 384;
const F_HEIGHT = 288;

const ETILE = 16;

/* 72px safety margin in WORLD SPACE */
const SAFE_MARGIN = 72;

/* feature count range */
const MIN_FEATURES = 1;
const MAX_FEATURES = 5;

/* =========================================================
   FEATURE MODEL
========================================================= */

let features = [];

/* =========================================================
   SINGLE (F) GENERATION
========================================================= */

function generateF(){

    /* one feature block */

    const pattern = [];

    const cols = F_WIDTH / ETILE;   // 24
    const rows = F_HEIGHT / ETILE;  // 18

    for(let y=0;y<rows;y++){

        for(let x=0;x<cols;x++){

            /* deterministic-ish density */

            const v =
                Math.random() > 0.7 ? 1 : 0;

            pattern.push(v);

        }

    }

    return pattern;

}

/* =========================================================
   FEATURE SET GENERATION (1–5 F BLOCKS)
========================================================= */

function generateFeatures(){

    features = [];

    const count =
        Math.floor(
            Math.random() *
            MAX_FEATURES
        ) + MIN_FEATURES;

    for(let i=0;i<count;i++){

        features.push({

            x: SAFE_MARGIN + i * (F_WIDTH + 20),

            y: SAFE_MARGIN,

            data: generateF()

        });

    }

}

/* =========================================================
   RENDER
========================================================= */

function render(){

    ctx.clearRect(
        0,0,
        F_WIDTH,
        F_HEIGHT
    );

    for(const f of features){

        const cols = F_WIDTH / ETILE;

        for(let i=0;i<f.data.length;i++){

            const v = f.data[i];

            if(!v) continue;

            const x = i % cols;
            const y = Math.floor(i / cols);

            ctx.fillStyle = "#ccc";

            ctx.fillRect(

                x * ETILE,
                y * ETILE,
                ETILE,
                ETILE

            );

        }

    }

}

/* =========================================================
   ZOOM (SAFE FOR LAYOUT COMPOSITION)
========================================================= */

let zoom = 1;

function setZoom(z){

    zoom = z;

    canvas.style.transform =
        `scale(${zoom})`;

}

window.setFeatureZoom = setZoom;

/* =========================================================
   HUB MESSAGES
========================================================= */

window.addEventListener("message",(e)=>{

    const msg = e.data;

    if(!msg) return;

    switch(msg.type){

        case "INIT":
            generateFeatures();
            render();
            break;

        case "REGENERATE_FEATURES":
            generateFeatures();
            render();
            break;

        case "FEATURE_ZOOM":
            setZoom(msg.payload.zoom);
            break;

    }

});

console.log("Feature widget ready (F-system enabled)");

</script>

</body>
</html>
