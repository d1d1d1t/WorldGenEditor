<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feature Generator</title>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:monospace;
}

/*=========================================================
  ROOT
=========================================================*/

#widget{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
}

/*=========================================================
  LOCAL TOOLBAR
=========================================================*/

#toolbar{

    height:44px;

    background:#1a1a1a;

    border-bottom:1px solid #2b2b2b;

    display:flex;

    align-items:center;

    gap:10px;

    padding:6px;

    box-sizing:border-box;

}

button{

    background:#222;

    color:#ddd;

    border:1px solid #444;

    padding:4px 10px;

    cursor:pointer;

}

button:hover{

    background:#2f2f2f;

}

label{

    color:#ccc;

    font-size:12px;

}

input[type=range]{

    width:120px;

}

#countValue{

    width:18px;

    display:inline-block;

    text-align:center;

}

/*=========================================================
  CANVAS AREA
=========================================================*/

#viewport{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:#101010;

}

canvas{

    image-rendering:pixelated;

    width:100%;

    height:100%;

    object-fit:contain;

}

</style>
</head>

<body>

<div id="widget">

<div id="toolbar">

<button id="generateBtn">
Generate
</button>

<button id="exportBtn">
Export
</button>

<label>

<input
id="linked"
type="checkbox">

Linked

</label>

<label>

Features

<input
id="featureCount"
type="range"
min="1"
max="5"
value="3">

<span id="countValue">
3
</span>

</label>

</div>

<div id="viewport">

<canvas
id="canvas"
width="768"
height="576">
</canvas>

</div>

</div>

<script type="module">

/*=========================================================
  CANVAS
=========================================================*/

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

/*=========================================================
  CONSTANTS
=========================================================*/

/* workspace */

const WIDTH = 768;
const HEIGHT = 576;

/* safe border */

const BORDER = 72;

/* one feature footprint */

const F_WIDTH = 384;
const F_HEIGHT = 288;

/* eTile */

const ETILE = 16;

/* footprint resolution */

const COLS = F_WIDTH / ETILE;
const ROWS = F_HEIGHT / ETILE;

/* grayscale values */

const VALUES = [

26,
52,
77,
102,
128,
166,
210,
255

];

/*=========================================================
  UI
=========================================================*/

const linkedBox =
document.getElementById("linked");

const slider =
document.getElementById("featureCount");

const countLabel =
document.getElementById("countValue");

slider.oninput = () =>
countLabel.textContent = slider.value;

/*=========================================================
  DATA
=========================================================*/

let linked = false;

let featureCount = 3;

/*
Every entry represents ONE (f)

{
    x,
    y,
    data[],
    linked
}
*/

let features = [];

linkedBox.onchange = () => {

    linked =
    linkedBox.checked;

};

slider.oninput = () => {

    featureCount =
    Number(slider.value);

    countLabel.textContent =
    featureCount;

};

/*=========================================================
  PART 2 CONTINUES HERE...
=========================================================*/

/*=========================================================
  BUILD ONE (f)
=========================================================*/

function randomValue(){

    return VALUES[
        Math.floor(
            Math.random()*VALUES.length
        )
    ];

}

/*=========================================================
  STRUCTURAL (f) GENERATOR
=========================================================*/

function buildF(){

    const COLS = Math.floor(F_WIDTH / ETILE);
    const ROWS = Math.floor(F_HEIGHT / ETILE);

    const total = COLS * ROWS;

    /* occupancy target (controls density) */
    const targetDensity = 0.22 + Math.random() * 0.18;

    const targetCount = Math.floor(total * targetDensity);

    /* grid occupancy map */
    const grid = new Array(COLS * ROWS).fill(0);

    /* seed start near center */
    let startX = Math.floor(COLS / 2);
    let startY = Math.floor(ROWS / 2);

    function idx(x,y){
        return y * COLS + x;
    }

    function inBounds(x,y){
        return x>=0 && y>=0 && x<COLS && y<ROWS;
    }

    function neighbors(x,y){
        return [
            [x+1,y],
            [x-1,y],
            [x,y+1],
            [x,y-1]
        ];
    }

    /* start seed */
    let frontier = [[startX,startY]];
    grid[idx(startX,startY)] = 1;

    let count = 1;

    /* growth-based cluster (NOT noise field) */
    while(frontier.length && count < targetCount){

        const i = Math.floor(Math.random() * frontier.length);
        const [x,y] = frontier[i];

        const n = neighbors(x,y);

        for(const [nx,ny] of n){

            if(!inBounds(nx,ny)) continue;

            const id = idx(nx,ny);

            if(grid[id] === 0 && Math.random() > 0.35){

                grid[id] = 1;
                frontier.push([nx,ny]);
                count++;

                if(count >= targetCount) break;
            }
        }

        /* prune frontier randomly */
        if(Math.random() > 0.7){
            frontier.splice(i,1);
        }
    }

    /* assign values AFTER structure exists */
    const data = grid.map(v => {

        if(v === 0) return 0;

        return VALUES[
            Math.floor(Math.random() * VALUES.length)
        ];

    });

    return {
        cols: COLS,
        rows: ROWS,
        data
    };
}

/*=========================================================
  COLLISION
=========================================================*/

function overlaps(x,y){

    for(const f of features){

        if(

            x < f.x + F_WIDTH + ETILE &&
            x + F_WIDTH + ETILE > f.x &&

            y < f.y + F_HEIGHT + ETILE &&
            y + F_HEIGHT + ETILE > f.y

        ){

            return true;

        }

    }

    return false;

}

/*=========================================================
  RANDOM POSITION
=========================================================*/

function randomPosition(){

    return{

        x:
        BORDER +

        Math.floor(

            Math.random()*

            (WIDTH-F_WIDTH-BORDER*2)

        ),

        y:
        BORDER +

        Math.floor(

            Math.random()*

            (HEIGHT-F_HEIGHT-BORDER*2)

        )

    };

}

/*=========================================================
  LINKED POSITION
=========================================================*/

function linkedPosition(parent){

    /*
       offsets are deliberately
       smaller than footprint
       allowing clusters
    */

    const choices=[

        [192,0],
        [-192,0],

        [0,144],
        [0,-144],

        [192,144],
        [-192,-144],

        [192,-144],
        [-192,144]

    ];

    const c=

        choices[
            Math.floor(
                Math.random()*choices.length
            )
        ];

    let x=

        parent.x+c[0];

    let y=

        parent.y+c[1];

    x=Math.max(

        BORDER,

        Math.min(

            WIDTH-F_WIDTH-BORDER,

            x

        )

    );

    y=Math.max(

        BORDER,

        Math.min(

            HEIGHT-F_HEIGHT-BORDER,

            y

        )

    );

    return{

        x,

        y

    };

}

/*=========================================================
  PLACE FEATURE
=========================================================*/

function placeFeature(){

    /*
      FIRST FEATURE
    */

    if(features.length===0){

        const p=randomPosition();

        features.push({

            x:p.x,

            y:p.y,

            data:buildF()

        });

        return;

    }

    /*
      LINKED MODE
    */

    if(linked){

        let attempts=50;

        while(attempts--){

            const parent=

                features[
                    Math.floor(
                        Math.random()*
                        features.length
                    )
                ];

            const p=

                linkedPosition(parent);

            if(!overlaps(p.x,p.y)){

                features.push({

                    x:p.x,

                    y:p.y,

                    data:buildF()

                });

                return;

            }

        }

    }

    /*
      UNLINKED MODE
    */

    let attempts=100;

    while(attempts--){

        const p=randomPosition();

        if(!overlaps(p.x,p.y)){

            features.push({

                x:p.x,

                y:p.y,

                data:buildF()

            });

            return;

        }

    }

}

/*=========================================================
  GENERATE
=========================================================*/

function generate(){

    features=[];

    for(

        let i=0;

        i<featureCount;

        i++

    ){

        placeFeature();

    }

}

/*=========================================================
  RENDER
=========================================================*/

function render(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    for(const feature of features){

        const f=feature.data;

        for(let i=0;i<f.data.length;i++){

            const value=f.data[i];

            if(value===0) continue;

            const ex=i%f.cols;
            const ey=Math.floor(i/f.cols);

            const px=feature.x+ex*ETILE;
            const py=feature.y+ey*ETILE;

            /* keep inside protected border */

            if(
                px < BORDER ||
                py < BORDER ||
                px + ETILE > WIDTH - BORDER ||
                py + ETILE > HEIGHT - BORDER
            ){
                continue;
            }

            ctx.fillStyle=`rgb(${value},${value},${value})`;

            ctx.fillRect(
                px,
                py,
                ETILE,
                ETILE
            );

        }

    }

}

/*=========================================================
  EXPORT
=========================================================*/

function exportFeature(){

    const link=document.createElement("a");

    link.download="feature_768x576.png";

    link.href=
        canvas.toDataURL("image/png");

    link.click();

}

/*=========================================================
  GENERATE + RENDER
=========================================================*/

function regenerate(){

    generate();
    render();

}

/*=========================================================
  UI
=========================================================*/

document
.getElementById("generateBtn")
.onclick=regenerate;

document
.getElementById("exportBtn")
.onclick=exportFeature;

/*=========================================================
  HUB MESSAGES
=========================================================*/

window.addEventListener("message",(e)=>{

    const msg=e.data;

    if(!msg) return;

    switch(msg.type){

        case "INIT":

            regenerate();
            break;

        case "GENERATE":

            regenerate();
            break;

        case "EXPORT":

            exportFeature();
            break;

        case "FEATURE_ZOOM":

            if(msg.payload?.zoom){

                canvas.style.transform=
                    `scale(${msg.payload.zoom})`;

            }

            break;

    }

});

/*=========================================================
  INITIALIZE
=========================================================*/

featureCount=
Number(slider.value);

linked=
linkedBox.checked;

regenerate();

console.log(
    "Feature Generator Ready"
);
