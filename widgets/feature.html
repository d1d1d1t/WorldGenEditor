<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Feature Generator</title>

  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/widgets.css">
</head>

<body>

<div class="widget">
  <div class="widget-toolbar">
    Feature Generator
    <button id="regen">Regenerate</button>
  </div>

  <div class="widget-canvas">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script type="module">

import { TILE_SPEC } from "../data/tile-spec.js";
import { context, clear } from "../shared/bitmap.js";
import { grayscale } from "../shared/colors.js";
import { listenToHub } from "../shared/widget-api.js";
import { PROJECT } from "../shared/project.js";

// -----------------------------
// Canvas setup (384 × 288)
// -----------------------------
const canvas = document.getElementById("canvas");

canvas.width = TILE_SPEC.canvas.feature.width;
canvas.height = TILE_SPEC.canvas.feature.height;

const ctx = context(canvas);

// -----------------------------
// Seeded RNG
// -----------------------------
function rng(seed) {
  let t = seed;
  return function () {
    t ^= t << 13;
    t ^= t >> 17;
    t ^= t << 5;
    return (t >>> 0) / 4294967296;
  };
}

let seed = PROJECT.seed;

// -----------------------------
// Feature system parameters
// -----------------------------
const eTile = TILE_SPEC.micro.feature.width; // 16px grid unit

const cols = Math.floor(canvas.width / eTile);  // 24
const rows = Math.floor(canvas.height / eTile); // 18

// -----------------------------
// Cluster generation
// -----------------------------
function generateFeatures() {

  clear(ctx, "#000");

  const random = rng(seed);

  // density map (0 empty, 1 max feature presence)
  const grid = Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => 0)
  );

  // seed initial clusters
  const seedCount = 6;

  const seeds = [];

  for (let i = 0; i < seedCount; i++) {

    const x = Math.floor(random() * cols);
    const y = Math.floor(random() * rows);

    grid[y][x] = 1;
    seeds.push({ x, y });

  }

  // growth iterations
  const steps = 18;

  for (let s = 0; s < steps; s++) {

    const newSeeds = [];

    for (const seed of seeds) {

      const dirs = [
        [1, 0],
        [-1, 0],
        [0, 1],
        [0, -1]
      ];

      for (const d of dirs) {

        if (random() > 0.55) continue;

        const nx = seed.x + d[0];
        const ny = seed.y + d[1];

        if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) continue;

        const strength = Math.max(0, grid[seed.y][seed.x] - 0.15);

        if (strength > grid[ny][nx]) {
          grid[ny][nx] = strength;
          newSeeds.push({ x: nx, y: ny });
        }
      }
    }

    seeds.push(...newSeeds);
  }

  // render
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      const v = grid[y][x];

      if (v <= 0) continue;

      let shade;

      if (v > 0.8) shade = 0.90;
      else if (v > 0.6) shade = 0.65;
      else if (v > 0.4) shade = 0.55;
      else if (v > 0.2) shade = 0.30;
      else shade = 0.20;

      ctx.fillStyle = grayscale(shade * 255);

      ctx.fillRect(
        x * eTile,
        y * eTile,
        eTile,
        eTile
      );
    }
  }
}

// -----------------------------
// UI
// -----------------------------
document.getElementById("regen").addEventListener("click", () => {
  seed = Math.floor(Math.random() * 1e9);
  generateFeatures();
});

// -----------------------------
// Hub communication
// -----------------------------
listenToHub((msg) => {

  if (msg.type === "INIT") {

    if (msg.payload?.project?.seed) {
      seed = msg.payload.project.seed;
    }

    generateFeatures();
  }

});

// initial render
generateFeatures();

</script>

</body>
</html>
