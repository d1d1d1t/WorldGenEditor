<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feature System</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

#wrap{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    width:100%;
    height:100%;
    image-rendering:pixelated;
}

</style>
</head>

<body>

<div id="wrap">
<canvas id="c" width="384" height="288"></canvas>
</div>

<script type="module">

/* =========================================================
   CANVAS
========================================================= */

const canvas =
document.getElementById("c");

const ctx =
canvas.getContext("2d");

/* =========================================================
   CONSTANTS
========================================================= */

const W = 384;
const H = 288;

/* HARD SAFE MARGIN */
const MARGIN = 65;

/* feature constraints */
const MIN_F = 1;
const MAX_F = 5;

/* (f) size reference */
const F_W = 384;
const F_H = 288;

/* =========================================================
   STATE
========================================================= */

let features = [];

/* =========================================================
   SAFE POSITIONING
========================================================= */

function safeX(){

    return Math.floor(
        MARGIN +
        Math.random() *
        (W - MARGIN * 2)
    );

}

function safeY(){

    return Math.floor(
        MARGIN +
        Math.random() *
        (H - MARGIN * 2)
    );

}

/* =========================================================
   (F) GENERATION (384×288 footprint)
========================================================= */

function buildF(){

    const data = [];

    const cols = Math.floor(F_W / 16);
    const rows = Math.floor(F_H / 16);

    for(let y=0;y<rows;y++){

        for(let x=0;x<cols;x++){

            data.push(Math.random() > 0.75 ? 1 : 0);

        }

    }

    return {
        data,
        cols,
        rows
    };

}

/* =========================================================
   FEATURE SET (1–5 F BLOCKS)
========================================================= */

function generate(){

    features = [];

    const count =
        Math.floor(Math.random() * MAX_F) + MIN_F;

    const baseX = safeX();
    const baseY = safeY();

    for(let i=0;i<count;i++){

        /* horizontal linking offset */
        const offsetX =
            i * (F_W - 40); // slight overlap allowance for linking

        features.push({

            x: baseX + offsetX,

            y: baseY,

            f: buildF()

        });

    }

}

/* =========================================================
   RENDER
========================================================= */

function render(){

    ctx.clearRect(0,0,W,H);

    for(const fset of features){

        const f = fset.f;

        for(let i=0;i<f.data.length;i++){

            if(!f.data[i]) continue;

            const x = i % f.cols;
            const y = Math.floor(i / f.cols);

            const px =
                fset.x + x * 16;

            const py =
                fset.y + y * 16;

            /* HARD BOUNDARY CHECK */

            if(
                px < MARGIN ||
                py < MARGIN ||
                px > W - MARGIN ||
                py > H - MARGIN
            ){
                continue;
            }

            ctx.fillStyle = "#ccc";

            ctx.fillRect(px,py,16,16);

        }

    }

}

/* =========================================================
   ZOOM SUPPORT (VIEW ONLY)
========================================================= */

let zoom = 1;

function setZoom(z){

    zoom = z;

    canvas.style.transform =
        `scale(${zoom})`;

}

window.setFeatureZoom = setZoom;

/* =========================================================
   MESSAGES
========================================================= */

window.addEventListener("message",(e)=>{

    const msg = e.data;

    if(!msg) return;

    switch(msg.type){

        case "INIT":
            generate();
            render();
            break;

        case "REGENERATE_FEATURES":
            generate();
            render();
            break;

case "GENERATE":
  generate();
  render();
  break;

case "EXPORT":
  exportFeature();
  break;

        case "FEATURE_ZOOM":
            setZoom(msg.payload.zoom);
            break;

    }

});

console.log("Feature system updated (1–5 bounded F blocks)");

</script>

</body>
</html>
