<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Overpass Generator</title>

  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/widgets.css">
</head>

<body>

<div class="widget">
  <div class="widget-toolbar">
    Overpass Generator
    <button id="regen">Regenerate</button>
  </div>

  <div class="widget-canvas">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script type="module">

import { TILE_SPEC } from "../data/tile-spec.js";
import { context, clear } from "../shared/bitmap.js";
import { grayscale } from "../shared/colors.js";
import { listenToHub } from "../shared/widget-api.js";
import { PROJECT } from "../shared/project.js";

// -----------------------------
// Canvas: 192 × 384
// -----------------------------
const canvas = document.getElementById("canvas");

canvas.width = 192;
canvas.height = 384;

const ctx = context(canvas);

let seed = PROJECT.seed;

// -----------------------------
// RNG
// -----------------------------
function rng(seed) {
  let t = seed;
  return function () {
    t ^= t << 13;
    t ^= t >> 17;
    t ^= t << 5;
    return (t >>> 0) / 4294967296;
  };
}

// -----------------------------
// Simulated road depth field
// (temporary until real Road export is wired)
// -----------------------------
function sampleRoadBand(random, yOffset) {

  const width = 192;
  const height = 192;

  const cols = 4;  // rTile columns across 192px
  const rows = 6;  // within 192px band

  const field = [];

  for (let y = 0; y < rows; y++) {

    const row = [];

    for (let x = 0; x < cols; x++) {

      // simulate road density
      const center = Math.abs(x - 1.5);

      const noise = random() * 0.6;

      // low value = road core (depth)
      const depth = Math.max(0, 1 - (center * 0.45 + noise));

      row.push(depth);
    }

    field.push(row);
  }

  return field;
}

// -----------------------------
// Bridge profile from band
// -----------------------------
function buildBridgeProfile(band) {

  const profile = [];

  for (let x = 0; x < band[0].length; x++) {

    let sum = 0;

    for (let y = 0; y < band.length; y++) {
      sum += band[y][x];
    }

    const avg = sum / band.length;

    // invert depth → bridge height
    const inverted = 1 - avg;

    // strong shaping curve (bridge arch)
    const shaped = Math.pow(inverted, 2.2);

    profile.push(shaped);
  }

  return profile;
}

// -----------------------------
// Render overpass slices vertically
// -----------------------------
function generateOverpass() {

  clear(ctx, "#000");

  const random = rng(seed);

  const bandHeight = 192;
  const slices = Math.floor(canvas.height / bandHeight);

  for (let i = 0; i < slices; i++) {

    const yOffset = i * bandHeight;

    const band = sampleRoadBand(random, yOffset);

    const profile = buildBridgeProfile(band);

    // render this slice
    for (let y = 0; y < bandHeight; y += 32) {
      for (let x = 0; x < 4; x++) {

        const h = profile[x];

        const shade =
          h > 0.75 ? 0.90 :
          h > 0.55 ? 0.65 :
          h > 0.35 ? 0.55 :
          h > 0.15 ? 0.30 :
                     0.20;

        ctx.fillStyle = grayscale(shade * 255);

        ctx.fillRect(
          x * 48,
          yOffset + y,
          48,
          32
        );
      }
    }
  }
}

// -----------------------------
// UI
// -----------------------------
document.getElementById("regen").addEventListener("click", () => {
  seed = Math.floor(Math.random() * 1e9);
  generateOverpass();
});

// -----------------------------
// Hub communication
// -----------------------------
listenToHub((msg) => {

  if (msg.type === "INIT") {
    if (msg.payload?.project?.seed) {
      seed = msg.payload.project.seed;
    }
    generateOverpass();
  }

});

generateOverpass();

</script>

</body>
</html>
